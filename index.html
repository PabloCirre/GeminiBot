<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GeminiBot</title>
    <!-- Premium Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <header class="app-header drag">
            <h1 class="logo">GeminiBot</h1>
            <div class="header-actions">
                <button id="agents-toggle" class="icon-btn no-drag">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>
                </button>
                <button id="settings-toggle" class="icon-btn no-drag">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
                <button id="close-app" class="icon-btn no-drag">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
        </header>
        <section id="settings-panel" class="settings-panel no-drag">
            <div class="setting-group">
               <label for="project-select">Active Context / Project</label>
               <select id="project-select">
                   <option value="none">Default (No Context)</option>
                   <option value="web-dev">Web Development Expert</option>
                   <option value="python-script">Python Automations</option>
                   <option value="creative-writing">Creative Writing</option>
               </select>
               <button id="select-folder-btn" class="btn secondary-btn" style="margin-top: 6px;">📁 Select Local Project Folder</button>
               <div id="selected-folder-display" style="font-size: 10px; color: var(--accent); margin-top: 4px; word-wrap: break-word;"></div>
            </div>
            
            <hr style="border: none; border-top: 1px solid var(--border); width: 100%; margin: 4px 0;">

            <div class="setting-group" style="display: none;">
                <label for="client-id">OAuth Client ID</label>
                <input type="text" id="client-id" placeholder="Google Cloud Client ID">
            </div>
            <div class="setting-group" style="display: none;">
                <label for="client-secret">OAuth Client Secret</label>
                <input type="password" id="client-secret" placeholder="Google Cloud Client Secret">
            </div>
            <button id="oauth-login" class="btn primary-btn" style="background: #4285F4;">Login with Google</button>
            <div id="auth-status" style="font-size: 11px; text-align: center; color: var(--text-secondary); margin-top: 4px;">Not authenticated</div>
            <div class="setting-group" style="position: relative;">
                <label>AI Model</label>
                <!-- Oculto para lógica interna -->
                <input type="hidden" id="model-select" value="gemini-1.5-pro">
                <div id="custom-model-selector" class="custom-selector">
                    <div id="selected-model-text">Loading models...</div>
                    <span class="dropdown-icon">▼</span>
                </div>
                <div id="model-dropdown" class="model-dropdown hidden">
                    <!-- Tarjetas inyectadas dinámicamente -->
                </div>
            </div>
            <div class="setting-group">
                <label for="system-prompt">System Prompt</label>
                <textarea id="system-prompt" rows="3" placeholder="Additional instructions..."></textarea>
            </div>
            <button id="save-settings" class="btn primary-btn">Save Settings</button>
            <button id="init-demo" class="btn secondary-btn" style="margin-top: 10px; border: 1px dashed var(--accent-glow); width: 100%;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Initialize UX Demo
            </button>
        </section>

        <section id="agents-panel" class="settings-panel no-drag">
            <h3 style="margin: 0 0 10px 0; font-size: 14px; text-align: center;">Cron Agents</h3>
            
            <div id="agents-list" style="display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto;">
                <!-- Agents injected here -->
            </div>
            
            <hr style="border: none; border-top: 1px solid var(--border); width: 100%; margin: 8px 0;">
            
            <div class="setting-group">
                <input type="text" id="agent-name" placeholder="Agent Name (e.g. Daily Review)">
            </div>
            <div class="setting-group">
                <select id="agent-cron">
                    <option value="* * * * *">Every Minute (Testing)</option>
                    <option value="0 * * * *">Every Hour</option>
                    <option value="0 9 * * *">Every Day (9:00 AM)</option>
                    <option value="0 3 * * *">Every Night (3:00 AM)</option>
                </select>
            </div>
            <div class="setting-group">
                <input type="hidden" id="agent-folder-path">
                <button id="agent-folder-btn" class="btn secondary-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    Target Folder
                </button>
                <div id="agent-folder-display" style="font-size: 10px; color: var(--accent); margin-top: 4px; word-wrap: break-word;"></div>
            </div>
            <div class="setting-group">
                <input type="text" id="agent-group" placeholder="Folder / Category (e.g. SEO, Security)">
            </div>
            <div class="setting-group">
                <textarea id="agent-prompt" rows="2" placeholder="Agent Instruction (Prompt)"></textarea>
            </div>
            <input type="hidden" id="editing-agent-id" value="">
            <div style="display: flex; gap: 8px;">
                <button id="add-agent-btn" class="btn primary-btn" style="flex: 2; display: flex; align-items: center; justify-content: center;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></svg>
                    Create Agent
                </button>
                <button id="cancel-edit-btn" class="btn secondary-btn" style="flex: 1; display: none;">Cancel</button>
            </div>
        </section>

        <main id="chat-container" class="chat-container no-drag">
            <!-- Chat history injected dynamically -->
        </main>

        <footer class="app-footer no-drag">
            <div class="input-wrapper">
                <textarea id="chat-input" rows="1" placeholder="Ask GeminiBot..."></textarea>
                <button id="send-btn" class="send-btn">
                    <!-- Send Icon SVG -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </footer>

    </div>
    <script src="renderer.js"></script>
</body>
</html>
