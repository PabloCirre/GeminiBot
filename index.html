<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Antigravity Gemini</title>
    <!-- Premium Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <header class="app-header drag">
            <h1 class="logo">GeminiBot</h1>
            <div class="header-actions">
                <button id="agents-toggle" class="icon-btn no-drag">🤖</button>
                <button id="settings-toggle" class="icon-btn no-drag">⚙️</button>
                <button id="close-app" class="icon-btn no-drag">❌</button>
            </div>
        </header>
        <section id="settings-panel" class="settings-panel no-drag">
            <div class="setting-group">
               <label for="project-select">Active Context / Project</label>
               <select id="project-select">
                   <option value="none">Default (No Context)</option>
                   <option value="web-dev">Web Development Expert</option>
                   <option value="python-script">Python Automations</option>
                   <option value="creative-writing">Creative Writing</option>
               </select>
               <button id="select-folder-btn" class="btn secondary-btn" style="margin-top: 6px;">📁 Select Local Project Folder</button>
               <div id="selected-folder-display" style="font-size: 10px; color: var(--accent); margin-top: 4px; word-wrap: break-word;"></div>
            </div>
            
            <hr style="border: none; border-top: 1px solid var(--border); width: 100%; margin: 4px 0;">

            <div class="setting-group" style="display: none;">
                <label for="client-id">OAuth Client ID</label>
                <input type="text" id="client-id" placeholder="Google Cloud Client ID">
            </div>
            <div class="setting-group" style="display: none;">
                <label for="client-secret">OAuth Client Secret</label>
                <input type="password" id="client-secret" placeholder="Google Cloud Client Secret">
            </div>
            <button id="oauth-login" class="btn primary-btn" style="background: #4285F4;">Login with Google</button>
            <div id="auth-status" style="font-size: 11px; text-align: center; color: var(--text-secondary); margin-top: 4px;">Not authenticated</div>
            <div class="setting-group" style="position: relative;">
                <label>AI Model</label>
                <!-- Oculto para lógica interna -->
                <input type="hidden" id="model-select" value="gemini-1.5-pro">
                <div id="custom-model-selector" class="custom-selector">
                    <div id="selected-model-text">Loading models...</div>
                    <span class="dropdown-icon">▼</span>
                </div>
                <div id="model-dropdown" class="model-dropdown hidden">
                    <!-- Tarjetas inyectadas dinámicamente -->
                </div>
            </div>
            <div class="setting-group">
                <label for="system-prompt">System Prompt</label>
                <textarea id="system-prompt" rows="3" placeholder="Additional instructions..."></textarea>
            </div>
            <button id="save-settings" class="btn primary-btn">Save Settings</button>
        </section>

        <section id="agents-panel" class="settings-panel no-drag">
            <h3 style="margin: 0 0 10px 0; font-size: 14px; text-align: center;">Cron Agents</h3>
            
            <div id="agents-list" style="display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto;">
                <!-- Agents injected here -->
            </div>
            
            <hr style="border: none; border-top: 1px solid var(--border); width: 100%; margin: 8px 0;">
            
            <div class="setting-group">
                <input type="text" id="agent-name" placeholder="Agent Name (e.g. Daily Review)">
            </div>
            <div class="setting-group">
                <select id="agent-cron">
                    <option value="* * * * *">Every Minute (Testing)</option>
                    <option value="0 * * * *">Every Hour</option>
                    <option value="0 9 * * *">Every Day (9:00 AM)</option>
                    <option value="0 3 * * *">Every Night (3:00 AM)</option>
                </select>
            </div>
            <div class="setting-group">
                <input type="hidden" id="agent-folder-path">
                <button id="agent-folder-btn" class="btn secondary-btn">📁 Target Folder</button>
                <div id="agent-folder-display" style="font-size: 10px; color: var(--accent); margin-top: 4px; word-wrap: break-word;"></div>
            </div>
            <div class="setting-group">
                <textarea id="agent-prompt" rows="2" placeholder="Agent Instruction (Prompt)"></textarea>
            </div>
            <input type="hidden" id="editing-agent-id" value="">
            <div style="display: flex; gap: 8px;">
                <button id="add-agent-btn" class="btn primary-btn" style="flex: 2;">➕ Create Agent</button>
                <button id="cancel-edit-btn" class="btn secondary-btn" style="flex: 1; display: none;">Cancel</button>
            </div>
        </section>

        <main id="chat-container" class="chat-container no-drag">
            <!-- Chat history injected dynamically -->
        </main>

        <footer class="app-footer no-drag">
            <div class="input-wrapper">
                <textarea id="chat-input" rows="1" placeholder="Ask Antigravity..."></textarea>
                <button id="send-btn" class="send-btn">
                    <!-- Send Icon SVG -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </footer>

    </div>
    <script src="renderer.js"></script>
</body>
</html>
